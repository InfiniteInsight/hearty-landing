<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devlog — Hearty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #f97316, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .prose { color: #374151; line-height: 1.75; }
    .prose h2 { font-size: 1.375rem; font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; color: #111827; }
    .prose h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #111827; }
    .prose p { margin-bottom: 1.25rem; }
    .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; }
    .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1.25rem; }
    .prose li { margin-bottom: 0.25rem; }
    .prose blockquote { border-left: 4px solid #fb923c; padding-left: 1rem; font-style: italic; color: #6b7280; margin-bottom: 1.25rem; }
    .prose code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; font-family: monospace; color: #1f2937; }
    .prose pre { background: #f3f4f6; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.25rem; overflow-x: auto; }
    .prose pre code { background: none; padding: 0; }
    .prose a { color: #f97316; text-decoration: underline; }
    .prose hr { border-color: #e5e7eb; margin: 2rem 0; }
    .prose strong { font-weight: 600; color: #111827; }
    .prose em { font-style: italic; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <!-- Nav -->
  <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-sm border-b border-gray-100 z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold gradient-text">Hearty</a>
      <div class="flex items-center gap-6">
        <a href="devlog.html" class="text-sm font-medium text-orange-500">Devlog</a>
        <a href="index.html#waitlist" class="bg-orange-500 hover:bg-orange-600 text-white text-sm font-medium px-4 py-2 rounded-full transition-colors">
          Join Waitlist
        </a>
      </div>
    </div>
  </nav>

  <!-- Post List -->
  <main id="post-list" class="hidden pt-24 pb-20 px-6">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-3xl font-bold mb-2">Devlog</h1>
      <p class="text-gray-500 mb-12">Building Hearty in public.</p>
      <div id="posts-container" class="space-y-0"></div>
    </div>
  </main>

  <!-- Single Post -->
  <main id="post-view" class="hidden pt-24 pb-20 px-6">
    <div class="max-w-2xl mx-auto">
      <a href="devlog.html" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-10 transition-colors">
        ← All posts
      </a>
      <div id="post-meta" class="mb-8"></div>
      <div id="post-content" class="prose"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-10 px-6 border-t border-gray-100 text-center text-sm text-gray-400">
    <a href="index.html" class="font-semibold gradient-text text-base">Hearty</a>
    <p class="mt-1">© 2026 Hearty. All rights reserved.</p>
  </footer>

  <script>
    const POSTS_INDEX = 'posts/index.json';

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadPostList() {
      const posts = await fetch(POSTS_INDEX).then(r => r.json());
      const container = document.getElementById('posts-container');
      container.innerHTML = posts.map((post, i) => `
        ${i > 0 ? '<hr class="border-gray-100 my-8" />' : ''}
        <article>
          <p class="text-sm text-orange-500 font-medium mb-1">${formatDate(post.date)}</p>
          <h2 class="text-xl font-bold mb-2">
            <a href="#${post.slug}" class="hover:text-orange-500 transition-colors">${post.title}</a>
          </h2>
          <p class="text-gray-500 text-sm leading-relaxed">${post.excerpt}</p>
        </article>
      `).join('');

      document.getElementById('post-list').classList.remove('hidden');
      document.getElementById('post-view').classList.add('hidden');
      document.title = 'Devlog — Hearty';
    }

    async function loadPost(slug) {
      const posts = await fetch(POSTS_INDEX).then(r => r.json());
      const meta = posts.find(p => p.slug === slug);
      if (!meta) { loadPostList(); return; }

      const md = await fetch(`posts/${slug}.md`).then(r => {
        if (!r.ok) throw new Error('not found');
        return r.text();
      }).catch(() => null);

      if (!md) { loadPostList(); return; }

      document.getElementById('post-meta').innerHTML = `
        <p class="text-sm text-orange-500 font-medium mb-3">${formatDate(meta.date)}</p>
        <h1 class="text-3xl font-bold mb-6">${meta.title}</h1>
        <hr class="border-gray-100" />
      `;
      document.getElementById('post-content').innerHTML = marked.parse(md);

      document.getElementById('post-list').classList.add('hidden');
      document.getElementById('post-view').classList.remove('hidden');
      document.title = `${meta.title} — Hearty Devlog`;
      window.scrollTo(0, 0);
    }

    function route() {
      const slug = window.location.hash.slice(1);
      slug ? loadPost(slug) : loadPostList();
    }

    window.addEventListener('hashchange', route);
    document.addEventListener('DOMContentLoaded', route);
  </script>

</body>
</html>
